name: Auto Obfuscate Worker to New File

on:
  push:
    branches:
      - main  # 如果你的默认分支是 master，请改为 master
    paths:
      - '_worker.js'  # 只有当原文件 _worker.js 发生更新时才触发

jobs:
  obfuscate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 确保 Action 有权限向你的仓库提交新文件

    steps:
      # 1. 拉取你的仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 配置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. 安装混淆工具并生成新文件
      - name: Run Javascript Obfuscator
        run: |
          npm install -g javascript-obfuscator
          
          # 读取根目录的 _worker.js，混淆后在根目录输出新文件 _worker.obfuscated.js
          javascript-obfuscator _worker.js --output _worker.obfuscated.js
          
          # (可选) 如果你希望自定义混淆参数，可以在此处添加，例如：
          # javascript-obfuscator _worker.js --output _worker.obfuscated.js --compact true --self-defending true

      # 4. 自动将新创建的文件 Commit 并 Push 回根目录
      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto generate obfuscated worker file [skip ci]"
          # 明确指定只提交这个新创建的文件，绝不影响原有的 _worker.js
          file_pattern: '_worker.obfuscated.js'
